<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YK OFFICIAL - Client Registration</title>
    <link rel="icon" href="https://i.ibb.co/hJCHgThF/logo-yk-crop.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a, #000000);
            background-attachment: fixed;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            color: white;
        }

        .input-field:focus {
            border-color: #6366f1;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }

        /* Animated background pulse */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(79, 70, 229, 0.05), transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        #pageLoader {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(99, 102, 241, 0.1);
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen text-slate-200 flex flex-col">

    <div class="bg-glow"></div>

    <div id="pageLoader">
        <div class="spinner"></div>
        <div class="mt-4 text-sm tracking-widest uppercase font-semibold text-indigo-400">YK OFFICIAL</div>
    </div>

    <nav class="sticky top-0 z-50 border-b border-white/10 bg-black/20 backdrop-blur-xl px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://i.ibb.co/hJCHgThF/logo-yk-crop.png" class="w-10 h-10 rounded-full border border-indigo-500/30 shadow-lg shadow-indigo-500/20" alt="Logo">
                <h1 class="font-bold text-2xl tracking-tight">YK <span class="text-indigo-400">OFFICIAL</span></h1>
            </div>
            <div class="flex gap-3">
                <button onclick="showHelp()" class="text-sm font-medium hover:text-indigo-400 transition-colors">Help</button>
                <button onclick="showContact()" class="bg-white text-black px-5 py-2 rounded-full text-sm font-bold hover:bg-slate-200 transition-all">Contact</button>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-4 sm:p-8">
        <div class="glass-card rounded-3xl p-8 sm:p-12 w-full max-w-2xl">
            <div class="text-center mb-10">
                <h2 class="text-3xl font-bold text-white mb-2">Project Request</h2>
                <p class="text-slate-400 text-sm">Secure corporate portal for professional service inquiries.</p>
            </div>

            <div class="flex justify-between mb-10 px-4 relative">
                <div class="absolute top-1/2 left-0 w-full h-[1px] bg-white/10 -z-10"></div>
                <div class="bg-indigo-600 w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold ring-4 ring-indigo-600/20">1</div>
                <div id="step2-icon" class="bg-slate-800 w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold">2</div>
                <div id="step3-icon" class="bg-slate-800 w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold">3</div>
            </div>

            <div id="verification-area" class="space-y-4">
                <div class="relative">
                    <input id="email" type="email" placeholder=" Email Address" class="input-field w-full p-4 rounded-xl">
                </div>
                <button onclick="sendOTP()" class="btn-primary w-full py-4 rounded-xl font-bold text-white uppercase tracking-wide">Request Access Code</button>
                
                <div class="pt-4 flex gap-2">
                    <input id="otp" placeholder="6-Digit OTP" class="input-field w-1/2 p-4 rounded-xl text-center tracking-[0.5em]">
                    <button onclick="verifyOTP()" class="bg-emerald-600 hover:bg-emerald-500 w-1/2 rounded-xl font-bold transition-all uppercase text-sm">Verify Identity</button>
                </div>
            </div>

            <div id="form" class="hidden space-y-4 mt-8 animate-[fadeIn_0.5s_ease-out]">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <input id="name" placeholder="Your Full Name" class="input-field p-4 rounded-xl">
                    <input id="phone" placeholder="Contact Number" class="input-field p-4 rounded-xl">
                </div>
                <select id="service" class="input-field w-full p-4 rounded-xl appearance-none">
                    <option class="text-black">Website Development</option>
                    <option class="text-black">UI Design & Branding</option>
                    <option class="text-black">Portfolio Website</option>
                    <option class="text-black">Custom IT Solution</option>
                </select>
                <textarea id="message" rows="4" placeholder="Briefly describe your project goals..." class="input-field w-full p-4 rounded-xl resize-none"></textarea>
                <button onclick="submitForm()" id="submitBtn" class="btn-primary w-full py-4 rounded-xl font-bold text-white uppercase shadow-lg">Submit Request</button>
            </div>
        </div>
    </main>

    <footer class="p-8 text-center border-t border-white/5">
        <p class="text-slate-500 text-xs font-medium tracking-widest">
            © 2026 YK OFFICIAL &bull; All Rights Reserved 
        </p>
    </footer>

    <div id="loader" class="hidden fixed inset-0 z-[100] backdrop-blur-sm bg-black/60 flex items-center justify-center">
        <div class="spinner"></div>
    </div>

    <div id="popup" class="hidden fixed inset-0 z-[110] bg-black/80 backdrop-blur-md flex items-center justify-center p-6">
        <div class="bg-slate-900 border border-white/10 p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl">
            <h2 id="popupTitle" class="text-xl font-bold text-white mb-2"></h2>
            <p id="popupMsg" class="text-slate-400 mb-6 text-sm leading-relaxed"></p>
            <button onclick="closePopup()" class="bg-indigo-600 w-full py-3 rounded-xl font-bold text-white hover:bg-indigo-500 transition-all">Understood</button>
        </div>
    </div>

    <div id="contact" class="hidden fixed inset-0 z-[110] bg-black/80 backdrop-blur-md flex items-center justify-center p-6">
        <div class="bg-slate-900 border border-white/10 p-8 rounded-3xl max-w-sm w-full text-center">
            <div class="w-16 h-16 bg-indigo-600/20 rounded-full flex items-center justify-center mx-auto mb-4 text-indigo-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-white mb-1">Direct Support</h2>
            <p class="text-indigo-400 font-semibold mb-4 text-sm">yegnesh7219@gmail.com</p>
            <p class="text-slate-400 text-xs mb-6 uppercase tracking-widest">Nagpur, India | YK Official Team</p>
            <button onclick="closeContact()" class="border border-white/10 w-full py-3 rounded-xl font-bold text-white hover:bg-white/5 transition-all">Close</button>
        </div>
    </div>

    <script>
        /* Initialization and Logic */
        emailjs.init("IjcMdGc7hhe75v6JE");
        let otpCode;
        const API = "https://script.google.com/macros/s/AKfycbwnBjAJdDDIwefyafJ1_1jAh84Vsgr9oslrvaPTYC5BN5Bpra-PkfgcDQ4dlWGw7q6T/exec";

        window.addEventListener("load", () => {
            const loader = document.getElementById("pageLoader");
            setTimeout(() => {
                loader.style.opacity = "0";
                setTimeout(() => loader.style.display = "none", 500);
            }, 800);
        });

        function showLoader() { document.getElementById("loader").classList.remove("hidden"); }
        function hideLoader() { document.getElementById("loader").classList.add("hidden"); }

        function showPopup(title, msg) {
            document.getElementById("popupTitle").innerText = title;
            document.getElementById("popupMsg").innerText = msg;
            document.getElementById("popup").classList.remove("hidden");
        }
        function closePopup() { document.getElementById("popup").classList.add("hidden"); }

        function showContact() { document.getElementById("contact").classList.remove("hidden"); }
        function closeContact() { document.getElementById("contact").classList.add("hidden"); }

        function showHelp() {
            showPopup("Portal Guide", "1. Provide Email\n2. Verify OTP\n3. Complete Brief\n4. Generate ID\n\nOur team reviews all requests within 24 hours.");
        }

        async function sendOTP() {
            let email = document.getElementById("email").value;
            if (!email) return showPopup("Required", "Please provide a valid email address.");
            
            otpCode = Math.floor(100000 + Math.random() * 900000);
            showLoader();
            try {
                await emailjs.send("service_9uwcu9x", "template_51t8llg", { email, otp: otpCode });
                hideLoader();
                showPopup("Success", "Security code dispatched to your inbox.");
                document.getElementById("step2-icon").classList.add("bg-indigo-600");
            } catch (e) {
                hideLoader();
                showPopup("Error", "Failed to send verification code.");
            }
        }

        function verifyOTP() {
            let user = document.getElementById("otp").value;
            if (user == otpCode) {
                document.getElementById("verification-area").classList.add("hidden");
                document.getElementById("form").classList.remove("hidden");
                document.getElementById("step3-icon").classList.add("bg-indigo-600");
                showPopup("Identity Verified", "You may now complete the project details.");
            } else {
                showPopup("Security Alert", "Invalid verification code entered.");
            }
        }

        function generateCustomerID(name) {
         // 1. Name se initials nikalna (e.g., "Yegnesh Kamble" -> "YK")
         let parts = name.trim().split(" ");
         let initials = (parts[0][0] + (parts[parts.length - 1][0] || "X")).toUpperCase();
     
         // 2. 4-digit ka random number generate karna (1000 se 9999 ke beech)
         let randomNum = Math.floor(1000 + Math.random() * 9000);
     
         // 3. Dono ko merge karna (e.g., YK4829)
         return initials + randomNum;
         }

        async function submitForm() {
            let btn = document.getElementById("submitBtn");
            let name = document.getElementById("name").value;
            if (!name) return showPopup("Incomplete", "Please enter your name.");

            btn.disabled = true;
            let customerID = generateCustomerID(name);
            let data = {
                id: customerID,
                name: name,
                email: document.getElementById("email").value,
                phone: document.getElementById("phone").value,
                service: document.getElementById("service").value,
                message: document.getElementById("message").value
            };

            showLoader();
            try {
                await fetch(API, { method: "POST", body: JSON.stringify(data) });
                await emailjs.send("service_9uwcu9x", "template_94xq6yl", {
                    name: data.name,
                    email: data.email,
                    phone: data.phone,
                    service: data.service,
                    customer_id: customerID
                });
                hideLoader();
                showPopup("Inquiry Logged", "Ticket #" + customerID + " generated. Refreshing...");
                setTimeout(() => location.reload(), 3000);
            } catch (err) {
                hideLoader();
                btn.disabled = false;
                showPopup("System Error", "Communication failed. Please try again.");
            }
        }

        /* SECURITY SCRIPT - UNTOUCHED LOGIC */
        document.addEventListener("contextmenu", e => { e.preventDefault(); showWarning(); });
        document.onkeydown = e => {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && (e.keyCode == 85 || e.keyCode == 67))) {
                showWarning(); return false;
            }
        };
        setInterval(() => {
            if (window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160) showWarning();
        }, 1000);

        function showWarning() {
            document.body.innerHTML = `
                <div style="height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;background:#000;color:#fff;font-family:sans-serif;text-align:center;padding:20px;">
                    <h1 style="font-size:32px;margin-bottom:20px;color:#ef4444;">⚠ SECURITY BREACH DETECTED</h1>
                    <p style="font-size:16px;max-width:500px;color:#94a3b8;line-height:1.6;">Developer tools are prohibited on this portal. Your session has been terminated to protect corporate data.</p>
                    <p style="margin-top:40px;font-size:14px;color:#475569;">© 2026 YK OFFICIAL - Admin: 7219274312</p>
                </div>`;
        }
    </script>
</body>
</html>
