    <!-- url id code  -->
  <script>
    /**
     * Unique ID Generate aur URL update karne ka function
     */
    function updateUrlWithUniqueId() {
        // 6 characters ki Random Unique ID (YK-XXXXXX)
        const uniqueId = Math.random().toString(36).substring(2, 8).toUpperCase();
        
        // Current Page Name (Pathname se page name nikalna)
        const pageName = window.location.pathname.split("/").pop().split(".")[0] || 'home';
        
        // Naya URL Hash format: #pageName?uid=YKOFFICIAL-${uniqueId}
        const newHash = `#${pageName}?uid=yKOfFiciAl${uniqueId}`;
        
        // Browser ka URL update karna bina reload kiye
        window.history.replaceState(null, null, newHash);
    }

    // Jab page pehli baar load ho
    window.addEventListener('DOMContentLoaded', updateUrlWithUniqueId);

    // Agar aapki site single page hai aur sections change hote hain
    window.addEventListener('hashchange', updateUrlWithUniqueId);
</script>
    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        --bg-primary: #0a0a0f;
        --bg-secondary: #14141f;
        --accent-primary: #ff2d55;
        --accent-secondary: #7928ca;
        --text-primary: #ffffff;
      }

      body {
        font-family: "Rajdhani", sans-serif;
        background: var(--bg-primary);
        margin: 0;
        padding: 0;
      }

      .gradient-bg {
        background: linear-gradient(
          135deg,
          var(--bg-primary) 0%,
          #1a1a2e 50%,
          var(--bg-primary) 100%
        );
      }

      .glow-text {
        text-shadow:
          0 0 20px var(--accent-primary),
          0 0 40px var(--accent-primary);
      }

      .card-glow {
        box-shadow:
          0 0 30px rgba(255, 45, 85, 0.1),
          0 10px 40px rgba(0, 0, 0, 0.5);
      }

      .btn-glow:hover {
        box-shadow: 0 0 25px var(--accent-primary);
      }

      .video-container {
        background: #000;
        position: relative;
      }

      .controls-overlay {
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
      }

      .center-play-btn {
        transition: all 0.3s ease;
      }

      .center-play-btn:hover {
        transform: scale(1.1);
      }

      .progress-bar {
        height: 5px;
        background: rgba(255, 255, 255, 0.2);
        cursor: pointer;
        transition: height 0.2s;
      }

      .progress-bar:hover {
        height: 8px;
      }

      .progress-filled {
        background: linear-gradient(
          90deg,
          var(--accent-primary),
          var(--accent-secondary)
        );
        height: 100%;
        position: relative;
      }

      .progress-thumb {
        width: 16px;
        height: 16px;
        background: var(--accent-primary);
        border-radius: 50%;
        position: absolute;
        right: -8px;
        top: 50%;
        transform: translateY(-50%);
        box-shadow: 0 0 10px var(--accent-primary);
        opacity: 0;
        transition: opacity 0.2s;
      }

      .progress-bar:hover .progress-thumb {
        opacity: 1;
      }

      .volume-slider {
        width: 80px;
        height: 4px;
        -webkit-appearance: none;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 2px;
        cursor: pointer;
      }

      .volume-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        background: var(--accent-primary);
        border-radius: 50%;
        cursor: pointer;
      }

      .settings-menu {
        background: rgba(20, 20, 31, 0.98);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 45, 85, 0.3);
      }

      .settings-item:hover {
        background: rgba(255, 45, 85, 0.2);
      }

      .video-card {
        transition: all 0.3s ease;
        border: 2px solid transparent;
      }

      .video-card:hover {
        border-color: var(--accent-primary);
        transform: translateY(-5px);
        box-shadow: 0 15px 40px rgba(255, 45, 85, 0.2);
      }

      .skip-indicator {
        animation: fadeOut 1s forwards;
      }

      @keyframes fadeOut {
        0% {
          opacity: 1;
          transform: scale(1);
        }
        100% {
          opacity: 0;
          transform: scale(1.5);
        }
      }

      .pulse-animation {
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      /* Hide default video controls */
      video::-webkit-media-controls {
        display: none !important;
      }

      video::-webkit-media-controls-enclosure {
        display: none !important;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }

      ::-webkit-scrollbar-track {
        background: var(--bg-primary);
      }

      ::-webkit-scrollbar-thumb {
        background: var(--accent-primary);
        border-radius: 4px;
      }

      /* Professional Cross Back Button */
      .back-btn {
        position: relative;
        width: 40px;
        height: 40px;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.95) 0%,
          rgba(255, 255, 255, 0.85) 100%
        );
        border: 1.5px solid rgba(255, 255, 255, 0.3);
        border-radius: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }

      .back-btn::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(
          45deg,
          transparent 30%,
          rgba(255, 255, 255, 0.1) 50%,
          transparent 70%
        );
        transition: all 0.5s;
        opacity: 0;
      }

      .back-btn:hover {
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.95) 0%,
          rgba(255, 255, 255, 0.85) 100%
        );
        border-color: rgba(255, 255, 255, 0.5);
        transform: translateY(-2px);
        box-shadow: 0 12px 40px rgba(168, 85, 247, 0.3);
      }

      .back-btn:hover::before {
        left: 150%;
        opacity: 1;
      }

      .back-btn:active {
        transform: scale(0.95) translateY(0px);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
      }

      .back-btn i {
        position: relative;
        z-index: 1;
        color: white;
        width: 24px;
        height: 24px;
        transition: all 0.3s ease;
      }

      .back-btn:hover i {
        transform: rotate(90deg) scale(1.2);
      }
    </style>

    <script>
      // Hide loader after page load
      window.addEventListener("load", function () {
        const loader = document.getElementById("loader");

        loader.style.opacity = "0";
        loader.style.transition = "opacity 0.6s ease";

        setTimeout(() => {
          loader.style.display = "none";
        }, 600);
      });
    </script>

        if (window.opener) {
          window.opener.focus();
          window.close();
        } else {
          window.location.href = "index.html";
        }
      }
    </script>
